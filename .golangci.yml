version: "2"

run:
  go: "1.26"
  timeout: 5m
  issues-exit-code: 1

linters:
  default: all
  disable:
    - cyclop
    - embeddedstructfieldcheck
    - err113
    - exhaustruct
    # forbidigo intentionally NOT disabled — carve-out #2 (ADR-0011 / NFR-DET-*)
    - funcorder
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - godot
    - godox
    - ireturn
    - lll
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5

  settings:
    depguard:
      rules:
        main:
          files:
            - $all
            - "!$test"
          deny:
            - pkg: io/ioutil
              desc: ioutil is deprecated starting with Go 1.16
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package
            - pkg: github.com/gobl/c14n
              desc: "Non-JCS encoding — use github.com/gowebpki/jcs per ADR-0010; gobl/c14n produces different bytes and breaks cross-deploy byte stability"
        test:
          files:
            - $test
          deny:
            - pkg: io/ioutil
              desc: ioutil is deprecated starting with Go 1.16
            - pkg: github.com/pkg/errors
              desc: Should be replaced by standard lib errors package

    errcheck:
      check-type-assertions: true

    exhaustive:
      default-signifies-exhaustive: true

    # ── carve-out #2: forbidigo settings (ADR-0011 / NFR-DET-*) ──
    forbidigo:
      forbid:
        - pattern: "time\\.Now\\b"
          msg: "Use ctx.Now on the replay path (ADR-0011 / NFR-DET-*). Exempt: _test.go, cmd/, internal/jcs/."
        - pattern: "rand\\.(Int|Float|Intn|Float64|Read|New|NewSource)\\b"
          msg: "Use ctx.Rand on the replay path (ADR-0011 / NFR-DET-*). Exempt: _test.go, cmd/, internal/jcs/."
        - pattern: "uuid\\.New\\b"
          msg: "Use ctx.UUID on the replay path (ADR-0011 / NFR-DET-*). Exempt: _test.go, cmd/, internal/jcs/."
      exclude-godoc-examples: true
      analyze-types: true

    goconst:
      min-len: 2
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style

    gomoddirectives:
      replace-local: true

    mnd:
      ignored-numbers:
        - "0o666"
        - "0o644"
        - "0o600"
        - "0o755"
        - "0o750"
        - "0o700"

    nolintlint:
      require-explanation: false
      require-specific: true

    # ── camelCase JSON tags enforced by tagliatelle — ADR-0032 (E20b one-time re-baseline,
    #    contractVersion 1→2; story 20.9). See development/governance/adrs/adr-0032_*.md ──
    tagliatelle:
      case:
        rules:
          avro: snake
          bson: camel
          env: upperSnake
          json: camel
          mapstructure: camel
          xml: camel
          yaml: camel
        use-field-name: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # ── carve-out #2: forbidigo path allow-list ──
      - linters:
          - forbidigo
        path: "_test\\.go"
      - linters:
          - forbidigo
        path: "^cmd/"
      - linters:
          - forbidigo
        path: "^internal/jcs/"
      # ── geodash exclusion rules (verbatim) ──
      - linters:
          - dupl
          - gocyclo
          - gosec
        path: _test\.go
      # ── Test-helper linter suppressions ──
      # unparam: test helper functions deliberately accept parameters for API consistency,
      # future extensibility, or interface conformance. Suppressed globally for _test.go files
      # to avoid noise on test scaffolding code.
      - linters:
          - unparam
        path: _test\.go
      # goconst: test files use literal strings as fixture/scenario identifiers where named
      # constants would reduce readability; suppress for test files to avoid refactoring noise.
      - linters:
          - goconst
        path: _test\.go
      - linters:
          - gocritic
        text: commentedOutCode
      - linters:
          - gocritic
        text: whyNoLint
      - linters:
          - gocritic
        text: unnecessaryBlock
      - linters:
          - gocritic
        text: todoCommentWithoutDetail
      - linters:
          - govet
        text: declaration of "(err|ctx)" shadows declaration at
      # ── Contextcheck: ADR-0007 mandates per-operation short-deadline contexts rooted at
      # context.Background() (via natsutil.Ctx). These "Non-inherited new context" findings
      # are intentional ADR-0007 conformant patterns — suppress at config level. ──
      - linters:
          - contextcheck
        text: "Non-inherited new context, use function like"
      - linters:
          - contextcheck
        text: "should pass the context parameter"
      # ── godoclint: suppress "has more than one godoc" false positives in multi-file
      # package main binaries (cmd/tenax/, cmd/tenaxd/, cmd/tenax-operator/,
      # cmd/tenax-nex-autoscaler/). Each .go file in these packages carries a per-file
      # context comment; godoclint fires on every file after the first because package
      # main has no importable public API surface. The exclusion is intentionally narrow:
      # ^cmd/ path only, godoclint linter only, "has more than one godoc" text match only.
      - linters:
          - godoclint
        path: "^cmd/"
        text: "has more than one godoc"
      # testpackage: ADR-0019 mandates white-box co-located unit tests for engine internals.
      # The entire internal/, sdk/, and test/ tree uses same-package (_test.go without _test suffix)
      # test files by design — this is the intended testing tier for logic that requires access
      # to unexported symbols. Black-box _test packages are used only where the public API surface
      # is sufficient. Converting ~63 white-box tests to black-box would break access to
      # unexported internals and violate ADR-0019 Tier 1 (unit) and Tier 2 (integration) design.
      # Exclusion is path-scoped (not a blanket disable) to preserve testpackage enforcement
      # on any future external-facing package where black-box style is appropriate.
      - linters:
          - testpackage
        path: "^(internal|sdk|test)/"
      # ── Test-stub nilnil: interface stubs in test files must return (nil, nil) to implement
      # the interface contract when the stub method is not exercised by the test. Suppressed
      # for _test.go only — production code still subject to nilnil enforcement. ──
      - linters:
          - nilnil
        path: _test\.go
      # ── Test noctx: os/exec.Command (without context) is acceptable in test-only utilities
      # that use go list for import-graph inspection. These tests do not have a meaningful
      # cancellation path and the subprocess is always short-lived. ──
      - linters:
          - noctx
        path: _test\.go
      # ── interfacebloat: admin.API and sdk.Context intentionally carry >10 methods because
      # they are the canonical public API surface (ADR-0027/ADR-0028). Splitting would
      # fragment the surface without reducing complexity. Suppressed at exact file paths. ──
      - linters:
          - interfacebloat
        path: "^(internal/admin/api|sdk/ctx)\\.go$"
      # ── maintidx: orchestration entry points (operator run, partition consumer, substrate
      # Provision, conformance encodeKnownEntry) have irreducible cyclomatic complexity because
      # they are dispatch tables or multi-step provisioning sequences. Refactoring would only
      # move complexity into helpers without reducing it. Suppressed at file paths only. ──
      - linters:
          - maintidx
        path: "^(cmd/tenax-operator/main|internal/partition/consumer|internal/substrate/provision|test/conformance/conformance_test)\\.go$"
      # ── nestif: nested-if complexity in cmd/ UI renderers, autoscaler, lease, placement,
      # and statemachine is structural (deep error-handling chains or multi-phase state
      # machines). Refactoring would only rename helpers without reducing nesting depth. ──
      - linters:
          - nestif
        path: "^(cmd/tenax/|cmd/tenaxd/main|internal/autoscaler/|internal/lease/|internal/placement/|internal/runtime/|internal/statemachine/)"
      # ── Carve-out #5: external Synadia-Nex struct tags stay snake_case — protocol constraint
      # (ADR-0016: Nex off the durability path; ADR-0024: placement actuator seam) ──
      - linters:
          - tagliatelle
        path: "^internal/(placement/nex_actuator|autoscaler/nex_client)\\.go$"
      # ── Carve-out #6: JCS int64 wrapper uses RFC 8785-mandated $tnx token (not a camelCase tag)
      # internal/jcs defines Int64Wrapper{json:"$tnx"} per RFC 8785 §4.2.3 — the $ prefix is
      # spec-required and not subject to camelCase naming conventions. ──
      - linters:
          - tagliatelle
        path: "^internal/jcs/"
      # ── Carve-out #7: Conformance test YAML fixture tags use corpus-frozen snake_case names
      # (entry_type, payload_jcs_bytes) matching the golden corpus YAML files under api/corpus/.
      # These are test-internal struct tags for reading the frozen corpus format; they must not
      # be renamed (ADR-0009). ──
      - linters:
          - tagliatelle
        path: "^test/conformance/"
    paths:
      - .bingo
      - .chglog
      - .github
      - .vscode
      - bin
      - build
      - config
      - deploy
      - development
      - doc
      - docs
      - docker
      - hot
      - logs
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    # ── carve-out #4: goimports local-prefixes ──
    goimports:
      local-prefixes:
        - github.com/exoport/axon-tenax
  exclusions:
    generated: lax
    paths:
      - .bingo
      - .chglog
      - .github
      - .vscode
      - bin
      - build
      - config
      - deploy
      - development
      - doc
      - docs
      - docker
      - hot
      - logs
      - third_party$
      - builtin$
      - examples$

# ── carve-out #1: surface all findings (burn-down baseline for E20a) ──
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
